# Databricks Apps configuration for CareGap Map (see DEPLOYMENT.md).
#
# Path A (default below): the app reads Parquet straight from a mounted
# Unity Catalog volume via the local data source.
# Path B: switch CAREGAP_DATA_SOURCE to "databricks" and provide the
# SQL-warehouse settings to read registered UC tables instead.
command: ["streamlit", "run", "app.py"]
env:
  - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
    value: "false"
  - name: CAREGAP_DATA_SOURCE
    value: "local"
  # Local dev default; on Databricks point at the volume, e.g.
  # /Volumes/main/caregap/caregap_data
  - name: CAREGAP_DATA_DIR
    value: "data"
  # Reviewer notes: "sqlite" locally; MUST be "databricks" when deployed
  # (the app filesystem is ephemeral - see DEPLOYMENT.md section 4).
  - name: CAREGAP_REVIEW_STORE
    value: "sqlite"
  # --- Path B (Unity Catalog tables via SQL warehouse) ---
  # - name: CAREGAP_DATA_SOURCE
  #   value: "databricks"
  # - name: CAREGAP_DATABRICKS_CATALOG
  #   value: "main"
