# Databricks Apps configuration for CareGap Map (see DEPLOYMENT.md).
#
# Live deployment: Path A - the app reads processed Parquet straight from the
# mounted Unity Catalog volume via the local data source; reviewer notes go
# to the workspace.caregap.review_notes Delta table through the app's
# sql-warehouse resource (service-principal OAuth; DATABRICKS_HOST and
# DATABRICKS_CLIENT_ID/SECRET are injected by the Apps runtime - no tokens
# in this file, ever).
command: ["streamlit", "run", "app.py"]
env:
  - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
    value: "false"
  - name: CAREGAP_DATA_SOURCE
    value: "local"
  - name: CAREGAP_DATA_DIR
    value: "/Volumes/workspace/caregap/caregap_data"
  - name: CAREGAP_REVIEW_STORE
    value: "databricks"
  - name: CAREGAP_DATABRICKS_CATALOG
    value: "workspace"
  - name: CAREGAP_DATABRICKS_SCHEMA
    value: "caregap"
  # Injected from the app's sql-warehouse resource; the code derives
  # /sql/1.0/warehouses/<id> from it.
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: "sql-warehouse"
